<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="nebrixlogo.svg">
    <title>Nebrix - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block">
    <script src="nebrix.js"></script>
    <style>
        .profile-container {
            max-width: 700px;
            margin: calc(var(--nav-h) + 40px) auto 40px;
            padding: 0 20px;
        }
        .profile-header {
            display: flex; align-items: center; gap: 24px;
            margin-bottom: 32px;
            padding: 32px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 20px;
            background: linear-gradient(135deg, var(--green-top), var(--green-bottom));
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 800; color: #fff;
            flex-shrink: 0;
        }
        .profile-info h1 {
            font-size: 1.8rem; font-weight: 800;
            margin-bottom: 4px;
        }
        .profile-info .role-badge {
            display: inline-block;
            padding: 4px 12px; border-radius: 999px;
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--btn-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .profile-info .role-badge.admin {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }
        .profile-info p {
            color: var(--text-muted); font-size: 0.9rem;
            margin-top: 6px;
        }
        .profile-details {
            display: grid; gap: 12px;
        }
        .detail-card {
            display: flex; align-items: center; gap: 14px;
            padding: 18px 20px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }
        .detail-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.03);
        }
        .detail-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--input-bg);
            display: flex; align-items: center; justify-content: center;
            color: var(--btn-green); flex-shrink: 0;
        }
        .detail-icon .material-symbols-outlined { font-size: 1.4rem; }
        .detail-content { flex: 1; min-width: 0; }
        .detail-label {
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); margin-bottom: 2px;
        }
        .detail-value {
            font-size: 1rem; font-weight: 600; color: var(--text-main);
            word-break: break-all;
        }
        .detail-value.muted { color: var(--text-muted); }
        .profile-section {
            margin-top: 32px;
        }
        .profile-section h2 {
            font-size: 1.2rem; font-weight: 700;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .logout-btn {
            width: 100%; padding: 14px;
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444; font-size: 0.95rem; font-weight: 700;
            border-radius: var(--radius-md); cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }
        .loading-state {
            text-align: center; padding: 40px;
            color: var(--text-muted); font-weight: 600;
        }
    </style>
</head>
<body>

<nav id="nebrix-nav"></nav>

<div class="profile-container">
    <div id="profile-content" class="loading-state anim-fade-in-up">
        <span class="material-symbols-outlined" style="font-size: 2rem; margin-bottom: 12px; display: block;">sync</span>
        Loading profile...
    </div>
</div>

<script>
const API_BASE = 'https://api.nebrixgames.com';

function getMonthName(m) {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return months[m - 1] || '';
}

function formatDate(unix) {
    if (!unix) return 'Unknown';
    return new Date(unix * 1000).toLocaleDateString('en-US', { 
        year: 'numeric', month: 'long', day: 'numeric' 
    });
}

async function loadProfile() {
    const container = document.getElementById('profile-content');
    const token = localStorage.getItem('nebrix_token');
    
    if (!token) {
        container.innerHTML = `
            <div style="text-align:center;padding:40px;">
                <span class="material-symbols-outlined" style="font-size:3rem;color:var(--text-muted);">lock</span>
                <p style="margin-top:16px;color:var(--text-muted);font-weight:600;">Please log in to view your profile.</p>
                <a href="index.html" class="btn-primary" style="margin-top:20px;display:inline-flex;">Go to Login</a>
            </div>`;
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/profile`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) throw new Error('Failed to load profile');
        
        const user = await res.json();
        const initial = (user.username || 'P').charAt(0).toUpperCase();
        const isAdmin = user.role === 'admin';
        
        let birthdayDisplay = 'Not set';
        if (user.birthday && user.birthday.year) {
            birthdayDisplay = `${getMonthName(user.birthday.month)} ${user.birthday.day}, ${user.birthday.year}`;
        }

        container.innerHTML = `
            <div class="profile-header anim-fade-in-up">
                <div class="profile-avatar">${initial}</div>
                <div class="profile-info">
                    <h1>${escapeHtml(user.username)}</h1>
                    <span class="role-badge ${isAdmin ? 'admin' : ''}">${isAdmin ? 'Admin' : 'Player'}</span>
                    <p>Joined ${formatDate(user.created_at)}</p>
                </div>
            </div>

            <div class="profile-details anim-stagger-children">
                <div class="detail-card">
                    <div class="detail-icon">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Username</div>
                        <div class="detail-value">${escapeHtml(user.username)}</div>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon">
                        <span class="material-symbols-outlined">mail</span>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Email</div>
                        <div class="detail-value">${escapeHtml(user.email || 'Not set')}</div>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon">
                        <span class="material-symbols-outlined">cake</span>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Birthday</div>
                        <div class="detail-value ${!user.birthday ? 'muted' : ''}">${birthdayDisplay}</div>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon">
                        <span class="material-symbols-outlined">shield</span>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Role</div>
                        <div class="detail-value" style="text-transform:capitalize;">${user.role || 'user'}</div>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon">
                        <span class="material-symbols-outlined">fingerprint</span>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">User ID</div>
                        <div class="detail-value" style="font-family:monospace;font-size:0.85rem;">${user.id}</div>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon">
                        <span class="material-symbols-outlined">calendar_today</span>
                    </div>
                    <div class="detail-content">
                        <div class="detail-label">Member Since</div>
                        <div class="detail-value">${formatDate(user.created_at)}</div>
                    </div>
                </div>
            </div>

            <div class="profile-section anim-fade-in-up" style="animation-delay:0.4s;">
                <h2>
                    <span class="material-symbols-outlined" style="color:var(--btn-green);">settings</span>
                    Account
                </h2>
                <a href="settings.html" class="btn-secondary" style="width:100%;justify-content:center;text-decoration:none;">
                    <span class="material-symbols-outlined">tune</span> Account Settings
                </a>
                <button class="logout-btn" onclick="logout()">
                    <span class="material-symbols-outlined" style="vertical-align:middle;margin-right:6px;">logout</span>
                    Logout
                </button>
            </div>
        `;

    } catch (err) {
        container.innerHTML = `
            <div style="text-align:center;padding:40px;">
                <span class="material-symbols-outlined" style="font-size:3rem;color:#ef4444;">error</span>
                <p style="margin-top:16px;color:var(--text-muted);font-weight:600;">Could not load profile.</p>
                <button onclick="loadProfile()" class="btn-secondary" style="margin-top:16px;">Try Again</button>
            </div>`;
    }
}

window.addEventListener('DOMContentLoaded', () => {
    if (typeof renderNav === "function") renderNav("profile");
    loadProfile();
});
</script>
</body>
</html>
