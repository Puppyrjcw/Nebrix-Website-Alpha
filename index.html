<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebrix - Create Account</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/nebrixlogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="nebrix.js"></script>
</head>
<body>

    <div class="split-layout">
        <div class="left-pane">
            <div class="brand-content">
                <a href="#" class="nav-brand">
                    <img src="assets/images/nebrixlogo2.png" alt="Nebrix Logo" class="nav-logo-img">
                </a>
              <h1>Releasing 2027</h1>
            </div>
        </div>

        <div class="right-pane">
            <div class="form-container anim-fade-in-up">
                <h2>Create an account</h2>
                
                <form id="signup-form" class="anim-stagger-children">
                    <div class="form-group">
                        <label>When's your birthday?</label>
                        <div class="date-selects">
                            <div class="select-wrapper">
                                <select id="month" required>
                                    <option value="" disabled selected>Month</option>
                                    <option value="1">January</option>
                                    <option value="2">February</option>
                                    <option value="3">March</option>
                                    <option value="4">April</option>
                                    <option value="5">May</option>
                                    <option value="6">June</option>
                                    <option value="7">July</option>
                                    <option value="8">August</option>
                                    <option value="9">September</option>
                                    <option value="10">October</option>
                                    <option value="11">November</option>
                                    <option value="12">December</option>
                                </select>
                                <span class="material-symbols-outlined dropdown-icon">expand_more</span>
                            </div>
                            <input type="number" id="day" placeholder="Day" min="1" max="31" required>
                            <input type="number" id="year" placeholder="Year" min="1900" max="2026" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Don't use your real name" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="At least 8 characters" required>
                    </div>

                    <p id="auth-error" style="color:#ef4444; font-size:0.85rem; font-weight:600; min-height:20px; margin-bottom:10px; text-align:center;"></p>

                    <button type="submit" class="submit-btn" id="submit-btn">Sign Up</button>

                    <p class="login-link">
                        Already have an account? <a href="#" class="link-underline" onclick="showLoginModal(); return false;">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('.submit-btn').addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            
            this.appendChild(ripple);
            
            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const month = parseInt(document.getElementById('month').value);
            const day = parseInt(document.getElementById('day').value);
            const year = parseInt(document.getElementById('year').value);
            const errorMsg = document.getElementById('auth-error');
            const btn = document.getElementById('submit-btn');
            const form = document.getElementById('signup-form');

            errorMsg.textContent = "";
            
            if (!month || !day || !year) {
                errorMsg.textContent = "Please enter your complete birthday.";
                form.classList.add('anim-shake');
                setTimeout(() => form.classList.remove('anim-shake'), 500);
                return;
            }
            
            if (!email || !username || !password) {
                errorMsg.textContent = "Please fill in all fields.";
                form.classList.add('anim-shake');
                setTimeout(() => form.classList.remove('anim-shake'), 500);
                return;
            }
            
            btn.textContent = "Creating account";
            btn.classList.add('btn-loading');
            btn.style.opacity = "0.8";
            btn.style.pointerEvents = "none";

            try {
                const res = await fetch(API + "/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        username, 
                        email,
                        password,
                        birthYear: year,
                        birthMonth: month,
                        birthDay: day
                    })
                });
                
                const data = await res.json();

                if (data.message || res.ok) {
                    btn.textContent = "✓ Account Created!";
                    btn.classList.remove('btn-loading');
                    btn.style.background = "#10b981";
                    btn.style.borderColor = "#10b981";
                    btn.style.color = "#fff";
                    
                    setTimeout(async () => {
                        const loginRes = await fetch(API + "/login", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ username, password })
                        });
                        
                        const loginData = await loginRes.json();
                        
                        if (loginData.token) {
                            saveSession(loginData.token, username);
                            window.location.href = "home.html";
                        } else {
                            errorMsg.textContent = "Account created! Please log in.";
                            errorMsg.style.color = "#10b981";
                            btn.textContent = "Sign Up";
                            btn.style.background = "";
                            btn.style.borderColor = "";
                            btn.style.color = "";
                            btn.style.opacity = "1";
                            btn.style.pointerEvents = "auto";
                            showLoginModal();
                        }
                    }, 500);
                } else {
                    errorMsg.textContent = data.error || "Registration failed.";
                    btn.textContent = "Sign Up";
                    btn.classList.remove('btn-loading');
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                    form.classList.add('anim-shake');
                    setTimeout(() => form.classList.remove('anim-shake'), 500);
                }
            } catch (err) {
                errorMsg.textContent = "Could not reach Nebrix servers.";
                btn.textContent = "Sign Up";
                btn.classList.remove('btn-loading');
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
                form.classList.add('anim-shake');
                setTimeout(() => form.classList.remove('anim-shake'), 500);
            }
        });
    </script>
</body>
</html>
