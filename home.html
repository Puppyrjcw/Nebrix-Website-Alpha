<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/images/nebrixlogo.png">
    <title>Nebrix - Home</title>

</head>
<body>

<nav id="nebrix-nav"></nav>

<div class="page-banner anim-fade-in-up">
    <div>

    <div style="display: flex; gap: 12px; flex-wrap: wrap;">

        <a href="https://discord.com/invite/XTa4GwaJFY" class="btn-secondary" target="_blank">
            <svg class="icon" viewBox="0 0 90 90" fill="currentColor"><path d="M72.7676 20.0778C67.5115 17.6715 61.9627 15.9643 56.263 15C55.4831 16.3943 54.7773 17.8288 54.1488 19.2976C48.0775 18.3827 41.9034 18.3827 35.832 19.2976C35.2032 17.829 34.4975 16.3944 33.7178 15C28.0144 15.9725 22.462 17.6837 17.2006 20.0904C6.75548 35.544 3.92396 50.6138 5.33972 65.4697C11.4567 69.9891 18.3033 73.4262 25.5819 75.6316C27.2209 73.4273 28.6711 71.0888 29.9173 68.641C27.5504 67.7569 25.2658 66.6663 23.0902 65.3816C23.6628 64.9663 24.2228 64.5384 24.7639 64.1232C31.0946 67.1003 38.0041 68.6439 44.9999 68.6439C51.9956 68.6439 58.9051 67.1003 65.2358 64.1232C65.7832 64.5699 66.3432 64.9978 66.9095 65.3816C64.7297 66.6684 62.441 67.7611 60.0698 68.6472C61.3145 71.094 62.7648 73.4305 64.4052 75.6316C71.6901 73.4351 78.5419 69.9996 84.66 65.476C86.3211 48.248 81.8222 33.3166 72.7676 20.0778ZM31.7106 56.3334C27.7653 56.3334 24.506 52.7532 24.506 48.3486C24.506 43.9441 27.6521 40.3324 31.698 40.3324C35.7439 40.3324 38.9782 43.9441 38.9089 48.3486C38.8397 52.7532 35.7314 56.3334 31.7106 56.3334ZM58.2891 56.3334C54.3376 56.3334 51.0908 52.7532 51.0908 48.3486C51.0908 43.9441 54.2369 40.3324 58.2891 40.3324C62.3413 40.3324 65.5504 43.9441 65.4812 48.3486C65.412 52.7532 62.3099 56.3334 58.2891 56.3334Z"/></svg>
            Discord
        </a>
    </div>
</div>

<div class="main-content">
    <div class="section anim-fade-in-up" style="animation-delay: 0.15s;">
        <div class="section-header">
            <span class="section-title"><span class="material-symbols-outlined" style="color: var(--text-muted);">folder</span> My Published Games</span>
            <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;" id="my-games-meta">0 Games</span>
        </div>
        <div id="my-games-grid" class="card-grid anim-stagger-children">
            <div class="empty-state">No games published yet</div>
        </div>
    </div>

    <div class="section anim-fade-in-up" style="animation-delay: 0.3s;">
        <div class="section-header">
            <span class="section-title"><span class="material-symbols-outlined" style="color: var(--text-muted);">public</span> All Community Games</span>
            <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;" id="pub-games-meta">Syncing...</span>
        </div>
        <div id="pub-games-grid" class="card-grid anim-stagger-children">
            <div class="empty-state">Searching for servers...</div>
        </div>
    </div>
</div>

<footer class="anim-fade-in-up" style="animation-delay: 0.45s;">
    <div class="footer-left">Nebrix</div>
    <div class="footer-copy">© 2026 Nebrix Platforms.</div>
</footer>

<script>
const API_BASE = `https://api.nebrixgames.com`;

function formatDate(unixSeconds) {
    if (!unixSeconds) return '—';
    return new Date(unixSeconds * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function makeGameCard(game, isOwn) {
    const card = document.createElement('div');
    card.className = 'panel-card clickable';
    card.innerHTML = `
        <div class="game-card-title">${escapeHtml(game.name)}</div>
        <div class="game-card-author">by ${escapeHtml(game.author)}</div>
        <div class="game-card-desc">${escapeHtml(game.description || '')}</div>
        <div class="game-card-meta">
            <span>${formatDate(game.published_at)}</span>
            <span style="display:flex; align-items:center; gap:4px;">
                <span class="material-symbols-outlined" style="font-size: 1rem;">play_arrow</span> ${game.play_count ?? 0} plays
            </span>
        </div>
        <button class="game-card-play" data-id="${escapeHtml(game.game_id)}">
            <span class="material-symbols-outlined" style="font-size: 1.1rem;">play_circle</span> Play
        </button>
    `;
    card.addEventListener('click', () => { window.location.href = `play.html?id=${encodeURIComponent(game.game_id)}`; });
    return card;
}

async function loadPublishedGames() {
    const pubGrid = document.getElementById('pub-games-grid');
    const myGrid = document.getElementById('my-games-grid');
    const pubMeta = document.getElementById('pub-games-meta');
    const myMeta = document.getElementById('my-games-meta');
    const loggedInUser = localStorage.getItem('nebrix_username') || null;

    try {
        const res = await fetch(`${API_BASE}/published`);
        const json = await res.json();
        const games = Array.isArray(json) ? json : (json.games || []);

        pubGrid.innerHTML = '';
        if (games.length === 0) {
            pubGrid.innerHTML = '<div class="empty-state">No games found</div>';
        } else {
            games.forEach(g => pubGrid.appendChild(makeGameCard(g, false)));
        }
        pubMeta.textContent = `${games.length} Game${games.length !== 1 ? 's' : ''}`;

        myGrid.innerHTML = '';
        if (loggedInUser) {
            const mine = games.filter(g => g.author && g.author.toLowerCase() === loggedInUser.toLowerCase());
            if (mine.length === 0) {
                myGrid.innerHTML = '<div class="empty-state">No games published</div>';
            } else {
                mine.forEach(g => myGrid.appendChild(makeGameCard(g, true)));
            }
            myMeta.textContent = `${mine.length} Game${mine.length !== 1 ? 's' : ''}`;
        } else {
            myGrid.innerHTML = '<div class="empty-state">Log in to view</div>';
            myMeta.textContent = '0 Games';
        }
    } catch (err) {
        pubGrid.innerHTML = '<div class="empty-state">Server offline</div>';
        pubMeta.textContent = 'Offline';
    }
}

window.addEventListener('DOMContentLoaded', () => {
    if (typeof renderNav === "function") renderNav("home");
    document.getElementById('player-display').innerText = localStorage.getItem('nebrix_username') || 'Player';
    loadPublishedGames();
});
</script>
</body>
</html>
